<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ryan te ajuda</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1efe8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    padding: 16px;
  }
  button {
    font-family: inherit;
    border: 0.5px solid #d3d1c7;
    background: #ffffff;
    border-radius: 8px;
    cursor: pointer;
  }
  button:hover { background: #f1efe8; }
  button:active { transform: scale(0.98); }
</style>
</head>
<body>

<div style="width:100%;max-width:360px;margin:0 auto;background:#ffffff;border-radius:16px;border:0.5px solid #d3d1c7;overflow:hidden;">
  <div style="padding:12px 14px;border-bottom:0.5px solid #d3d1c7;display:flex;align-items:center;gap:8px;">
    <i class="ti ti-calculator" style="font-size:18px;color:#185fa5;" aria-hidden="true"></i>
    <span style="font-weight:600;font-size:15px;color:#2c2c2a;">Ryan te ajuda</span>
    <span style="margin-left:auto;font-size:10px;background:#eeedfe;color:#26215c;padding:3px 7px;border-radius:8px;">PRO</span>
  </div>

  <div style="padding:12px;">
    <input id="display" type="text" readonly value="0" style="width:100%;text-align:right;font-size:24px;font-weight:600;border:none;background:#f1efe8;border-radius:8px;padding:12px 10px;margin-bottom:10px;box-sizing:border-box;color:#2c2c2a;" />

    <div id="keys" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;"></div>
  </div>

  <div id="paywall" style="max-height:0;overflow:hidden;transition:max-height 0.4s ease, opacity 0.4s ease;opacity:0;border-top:0.5px solid #d3d1c7;">
    <div style="padding:14px;">
      <p style="font-size:12px;color:#5f5e5a;margin:0 0 10px;text-align:center;">A resposta está pronta. Escolha um plano pra revelar:</p>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button id="plano-mensal" style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;font-size:13px;color:#2c2c2a;">
          <span>Plano mensal</span><span style="font-weight:600;">R$ 29,90/mês</span>
        </button>
        <button id="plano-anual" style="display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:10px 12px;border:2px solid #378add;font-size:13px;color:#2c2c2a;">
          <span style="font-size:10px;background:#e6f1fb;color:#0c447c;padding:2px 6px;border-radius:8px;">Mais popular</span>
          <span style="display:flex;justify-content:space-between;width:100%;"><span>Plano anual</span><span style="font-weight:600;">R$ 199,90/ano</span></span>
        </button>
        <button id="plano-unico" style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;font-size:13px;color:#2c2c2a;">
          <span>Resposta única</span><span style="font-weight:600;">R$ 9,90</span>
        </button>
      </div>
      <p style="font-size:10px;color:#888780;margin:10px 0 0;text-align:center;">Cancele quando quiser. Resultado não incluso.</p>
    </div>
  </div>
</div>

<script>
const keysDiv = document.getElementById('keys');
const display = document.getElementById('display');
const paywall = document.getElementById('paywall');
let expr = '';

const keys = ['7','8','9','/','4','5','6','*','1','2','3','-','C','0','=','+'];
keys.forEach(k => {
  const btn = document.createElement('button');
  btn.textContent = k;
  btn.style.fontSize = '17px';
  btn.style.padding = '14px 0';
  btn.style.minHeight = '44px';
  btn.style.touchAction = 'manipulation';
  btn.style.color = '#2c2c2a';
  if (k === '=') {
    btn.style.background = '#378add';
    btn.style.color = '#ffffff';
    btn.style.border = 'none';
  }
  btn.onclick = () => handleKey(k);
  keysDiv.appendChild(btn);
});

function openPaywall() {
  paywall.style.maxHeight = paywall.scrollHeight + 'px';
  paywall.style.opacity = '1';
}
function closePaywall() {
  paywall.style.maxHeight = '0';
  paywall.style.opacity = '0';
}

function handleKey(k) {
  if (k === 'C') {
    expr = '';
    display.value = '0';
    closePaywall();
    return;
  }
  if (k === '=') {
    if (!expr) return;
    display.value = 'Resultado bloqueado';
    openPaywall();
    return;
  }
  closePaywall();
  expr += k;
  display.value = expr;
}

document.getElementById('plano-mensal').onclick = () => alert('Zoeira! Não existe plano de verdade 😂');
document.getElementById('plano-anual').onclick = () => alert('Zoeira! Não existe plano de verdade 😂');
document.getElementById('plano-unico').onclick = () => alert('Zoeira! Não existe plano de verdade 😂');
</script>

</body>
</html>
